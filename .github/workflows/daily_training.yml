name: Daily Forex Model Training

on:
  schedule:
    - cron: '0 17 * * *' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train_and_update:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9' 
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily training pipeline
        run: |
          python pipelines/train_daily.py

      - name: Commit and Push updated models
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add .
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update daily forex models [skip ci]" && git push)